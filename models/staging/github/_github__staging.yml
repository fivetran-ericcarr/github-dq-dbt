version: 2

models:
  - name: stg_github__repository
    description: One row per GitHub repository.
    columns:
      - name: repository_id
        description: Primary key.
        tests: [not_null, unique]
      - name: repository_full_name
        tests: [not_null, unique]
      - name: owner_id
        tests:
          - relationships:
              to: ref('stg_github__user')
              field: user_id
              config:
                severity: warn

  - name: stg_github__user
    description: One row per GitHub user referenced by the repo.
    columns:
      - name: user_id
        description: Primary key.
        tests: [not_null, unique]
      - name: user_login
        tests: [not_null]

  - name: stg_github__issue
    description: One row per issue.
    columns:
      - name: issue_id
        description: Primary key.
        tests: [not_null, unique]
      - name: state
        tests:
          - accepted_values:
              values: ['open', 'closed']
      - name: repository_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_github__repository')
              field: repository_id
      - name: user_id
        tests:
          - relationships:
              to: ref('stg_github__user')
              field: user_id
              config:
                severity: warn

  - name: stg_github__pull_request
    description: One row per pull request.
    columns:
      - name: pull_request_id
        description: Primary key.
        tests: [not_null, unique]
      - name: issue_id
        tests:
          - relationships:
              to: ref('stg_github__issue')
              field: issue_id
              config:
                severity: warn

  - name: stg_github__issue_comment
    description: One row per comment on an issue or pull request.
    columns:
      - name: issue_comment_id
        description: Primary key.
        tests: [not_null, unique]
      - name: issue_id
        tests:
          - relationships:
              to: ref('stg_github__issue')
              field: issue_id
              config:
                severity: warn
      - name: user_id
        tests:
          - relationships:
              to: ref('stg_github__user')
              field: user_id
              config:
                severity: warn

  - name: stg_github__label
    description: One row per issue/PR label.
    columns:
      - name: label_id
        description: Primary key.
        tests: [not_null, unique]
      - name: label_name
        tests: [not_null]

  - name: stg_github__pull_request_review
    description: One row per pull request review.
    columns:
      - name: pull_request_review_id
        description: Primary key.
        tests: [not_null, unique]
      - name: pull_request_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_github__pull_request')
              field: pull_request_id
              config:
                severity: warn
      - name: state
        tests:
          - accepted_values:
              values: ['approved', 'changes_requested', 'commented', 'dismissed', 'pending']
              config:
                severity: warn
