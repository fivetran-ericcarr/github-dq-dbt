version: 2

groups:
  - name: analytics
    owner:
      name: Analytics Team
      email: analytics@example.com

models:
  - name: github__repository_issue_summary
    description: >
      One row per repository with issue and pull request counts. Demonstrates
      model -> model lineage (staging -> mart) and dbt governance (enforced
      contract, ownership, access) for the metadata-service.
    access: public
    group: analytics
    config:
      contract:
        enforced: true
      meta:
        owner: Data Platform Team
    columns:
      - name: repository_id
        description: Primary key (one row per repository).
        data_type: number
        constraints:
          - type: not_null
        tests: [not_null, unique]
      - name: repository_full_name
        data_type: varchar
        tests: [not_null]
      - name: language
        data_type: varchar
      - name: total_issues
        data_type: number
        tests: [not_null]
      - name: open_issues
        data_type: number
        tests: [not_null]
      - name: closed_issues
        data_type: number
        tests: [not_null]
      - name: total_pull_requests
        data_type: number
      - name: last_issue_created_at
        data_type: timestamp_tz
